# Configuración de la base de datos MySQL (Render variables)
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/wishport_db?createDatabaseIfNotExist=true&serverTimezone=Europe/Madrid&sslMode=REQUIRED}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tu_password_aqui}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Configuración del servidor (Render usa PORT)
server.port=${PORT:8080}

# Clave secreta para JWT (Render usa JWT_SECRET)
wishport.jwt.secret=${JWT_SECRET:mi_clave_secreta_muy_larga_y_segura_para_firmar_tokens_jwt_debe_tener_al_menos_256_bits}

# Configuración de logging
logging.level.com.wishport.backend=INFO
logging.level.org.springframework.security=WARN